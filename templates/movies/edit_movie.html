{% extends 'base.html' %}

{% block content %}
<div style="max-width: 800px; margin: 0 auto;">
    <h1 style="font-family: 'BBH Bartle', sans-serif; margin-bottom: 2rem;">Edit Movie</h1>
    
    <form method="post" style="background: #ffffff; border: 3px solid rgb(255, 5, 5); padding: 2rem; border-radius: 10px;">
        {% csrf_token %}
        
        <div style="margin-bottom: 1rem;">
            <label style="display: block; margin-bottom: 0.5rem;">Title</label>
            <input type="text" name="title" value="{{ movie.title }}" required style="width: 100%; padding: 0.75rem; background: #ffffff; border: 1px solid #ff0000; color: rgb(0, 0, 0); border-radius: 4px;">
        </div>
        
        <div style="margin-bottom: 1rem;">
            <label style="display: block; margin-bottom: 0.5rem;">Description</label>
            <textarea name="description" rows="4" required style="width: 100%; padding: 0.75rem; background: #ffffff; border: 1px solid #ff0000; color: rgb(0, 0, 0); border-radius: 4px;">{{ movie.description }}</textarea>
        </div>
        
        <div style="margin-bottom: 1rem;">
            <label style="display: block; margin-bottom: 0.5rem;">Poster URL</label>
            <input type="url" name="poster" value="{{ movie.poster }}" required style="width: 100%; padding: 0.75rem; background: #ffffff; border: 1px solid #ff0000; color: rgb(0, 0, 0); border-radius: 4px;">
        </div>
        
        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; margin-bottom: 1rem;">
            <div>
                <label style="display: block; margin-bottom: 0.5rem;">Year</label>
                <input type="number" name="year" value="{{ movie.year }}" required style="width: 100%; padding: 0.75rem; background: #ffffff; border: 1px solid #ff0000; color: rgb(0, 0, 0); border-radius: 4px;">
            </div>
            <div>
                <label style="display: block; margin-bottom: 0.5rem;">Rating</label>
                <input type="number" step="0.1" name="rating" value="{{ movie.rating }}" required style="width: 100%; padding: 0.75rem; background: #ffffff; border: 1px solid #ff0000; color: rgb(0, 0, 0); border-radius: 4px;">
            </div>
        </div>
        
        <div style="margin-bottom: 1rem;">
            <label style="display: block; margin-bottom: 0.5rem;">Director</label>
            <input type="text" name="director" value="{{ movie.director|default:'' }}" style="width: 100%; padding: 0.75rem; background: #ffffff; border: 1px solid #ff0000; color: rgb(0, 0, 0); border-radius: 4px;">
        </div>
        
        <div style="margin-bottom: 1rem;">
            <label style="display: block; margin-bottom: 0.5rem;">Category</label>
            <select name="category" required style="width: 100%; padding: 0.75rem; background: #ffffff; border: 1px solid #ff0000; color: rgb(0, 0, 0); border-radius: 4px;">
                {% for category in categories %}
                <option value="{{ category.id }}" {% if movie.category.id == category.id %}selected{% endif %}>
                    {{ category.name }}
                </option>
                {% endfor %}
            </select>
        </div>
        
        <div style="margin-bottom: 1rem;">
            <label style="display: block; margin-bottom: 0.5rem;">Actors</label>
            <select name="actors" multiple style="width: 100%; padding: 0.75rem; background: #ffffff; border: 1px solid #ff0000; color: rgb(0, 0, 0); border-radius: 4px; min-height: 150px;">
                {% for actor in actors %}
                <option value="{{ actor.id }}" {% if actor in movie.actors.all %}selected{% endif %}>
                    {{ actor.name }}
                </option>
                {% endfor %}
            </select>
            <small style="color: #666;">Hold Ctrl to select multiple actors</small>
        </div>
        
        <button type="submit" style="background: #e50914; color: rgb(0, 0, 0); padding: 0.75rem 1.5rem; border: none; border-radius: 4px; cursor: pointer;">Save Changes</button>
        <a href="{% url 'admin_panel' %}" style="background: #ffffff; color: rgb(0, 0, 0); padding: 0.75rem 1.5rem; text-decoration: none; border-radius: 4px; margin-left: 1rem;">Cancel</a>
    </form>
</div>
{% endblock %}
