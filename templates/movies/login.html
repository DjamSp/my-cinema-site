{% extends 'base.html' %}

{% block content %}
<div style="max-width: 400px; margin: 100px auto; background: #ffffff;border: 3px solid rgb(255, 5, 5); padding: 2rem; border-radius: 10px;">
    <h2 style="font-family: 'BBH Bartle', sans-serif; text-align: center; margin-bottom: 2rem;">Login</h2>
    
    {% if error %}
    <div style="background: rgba(255, 255, 255, 0.2); border: 1px solid #e50914; padding: 0.75rem; border-radius: 8px; margin-bottom: 1rem; text-align: center;">
        {{ error }}
    </div>
    {% endif %}
    
    <form method="post">
        {% csrf_token %}
        <div style="margin-bottom: 1rem;">
            <label style="display: block; margin-bottom: 0.5rem; color: #888;">Username</label>
            <input type="text" name="username" style="width: 100%; padding: 0.75rem; background: #ffffff; border: 1px solid #ff0000; color: rgb(0, 0, 0); border-radius: 4px;" required>
        </div>
        <div style="margin-bottom: 1.5rem;">
            <label style="display: block; margin-bottom: 0.5rem; color: #888;">Password</label>
            <input type="password" name="password" style="width: 100%; padding: 0.75rem; background: #ffffff; border: 1px solid #ff0000; color: rgb(0, 0, 0); border-radius: 4px;" required>
        </div>
        <button type="submit" style="width: 100%; padding: 0.75rem; background: #e50914; border: none; color: rgb(0, 0, 0); border-radius: 4px; cursor: pointer; font-weight: 600;">
            Login
        </button>
    </form>
</div>
{% endblock %}
