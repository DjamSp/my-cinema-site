{% extends 'base.html' %}

{% block content %}
<div style="max-width: 800px; margin: 0 auto;">
    <h1 style="font-family: 'Playfair Display', serif; margin-bottom: 2rem;">Add New Movie</h1>
    
    <form method="post" style="background: #111; padding: 2rem; border-radius: 12px;">
        {% csrf_token %}
        
        <div style="margin-bottom: 1rem;">
            <label style="display: block; margin-bottom: 0.5rem; color: #888;">Title</label>
            <input type="text" name="title" required style="width: 100%; padding: 0.75rem; background: #1a1a1a; border: 1px solid #333; color: white; border-radius: 4px;">
        </div>
        
        <div style="margin-bottom: 1rem;">
            <label style="display: block; margin-bottom: 0.5rem; color: #888;">Description</label>
            <textarea name="description" rows="4" required style="width: 100%; padding: 0.75rem; background: #1a1a1a; border: 1px solid #333; color: white; border-radius: 4px;"></textarea>
        </div>
        
        <div style="margin-bottom: 1rem;">
            <label style="display: block; margin-bottom: 0.5rem; color: #888;">Poster URL</label>
            <input type="url" name="poster" required style="width: 100%; padding: 0.75rem; background: #1a1a1a; border: 1px solid #333; color: white; border-radius: 4px;">
        </div>
        
        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; margin-bottom: 1rem;">
            <div>
                <label style="display: block; margin-bottom: 0.5rem; color: #888;">Year</label>
                <input type="number" name="year" required style="width: 100%; padding: 0.75rem; background: #1a1a1a; border: 1px solid #333; color: white; border-radius: 4px;">
            </div>
            <div>
                <label style="display: block; margin-bottom: 0.5rem; color: #888;">Rating</label>
                <input type="number" step="0.1" name="rating" required style="width: 100%; padding: 0.75rem; background: #1a1a1a; border: 1px solid #333; color: white; border-radius: 4px;">
            </div>
        </div>
        
        <div style="margin-bottom: 1rem;">
            <label style="display: block; margin-bottom: 0.5rem; color: #888;">Director</label>
            <input type="text" name="director" style="width: 100%; padding: 0.75rem; background: #1a1a1a; border: 1px solid #333; color: white; border-radius: 4px;">
        </div>
        
        <div style="margin-bottom: 1rem;">
            <label style="display: block; margin-bottom: 0.5rem; color: #888;">Category</label>
            <select name="category" required style="width: 100%; padding: 0.75rem; background: #1a1a1a; border: 1px solid #333; color: white; border-radius: 4px;">
                {% for category in categories %}
                <option value="{{ category.id }}">{{ category.name }}</option>
                {% endfor %}
            </select>
        </div>
        
        <div style="margin-bottom: 1rem;">
            <label style="display: block; margin-bottom: 0.5rem; color: #888;">Actors (hold Ctrl to select multiple)</label>
            <select name="actors" multiple style="width: 100%; padding: 0.75rem; background: #1a1a1a; border: 1px solid #333; color: white; border-radius: 4px; min-height: 150px;">
                {% for actor in actors %}
                <option value="{{ actor.id }}">{{ actor.name }}</option>
                {% endfor %}
            </select>
            <small style="color: #666; display: block; margin-top: 0.25rem;">Hold Ctrl (Windows) or Cmd (Mac) to select multiple actors</small>
        </div>
        
        <button type="submit" style="background: #e50914; color: white; padding: 0.75rem 1.5rem; border: none; border-radius: 4px; cursor: pointer;">Add Movie</button>
        <a href="{% url 'admin_panel' %}" style="background: #333; color: white; padding: 0.75rem 1.5rem; text-decoration: none; border-radius: 4px; margin-left: 1rem;">Cancel</a>
    </form>
</div>
{% endblock %}
