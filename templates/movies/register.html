{% extends 'base.html' %}

{% block content %}
<div style="max-width: 400px; margin: 100px auto; background: #ffffff; padding: 2rem; border-radius: 10px; border: 3px solid rgb(255, 5, 5);">
    <h2 style="font-family: 'BBH Bartle', sans-serif; text-align: center; margin-bottom: 2rem;">Register</h2>
    
    {% if error %}
    <div style="background: rgba(255, 255, 255, 0.2); border: 1px solid #e50914; padding: 0.75rem; border-radius: 8px; margin-bottom: 1rem; text-align: center;">
        {{ error }}
    </div>
    {% endif %}
    
    <form method="post">
        {% csrf_token %}
        <div style="margin-bottom: 1rem;">
            <label style="display: block; margin-bottom: 0.5rem; color: #888;">Username</label>
            <input type="text" name="username" required style="width: 100%; padding: 0.75rem; background: #ffffff; border: 1px solid #ff0000; color: rgb(0, 0, 0); border-radius: 4px;">
        </div>
        <div style="margin-bottom: 1rem;">
            <label style="display: block; margin-bottom: 0.5rem; color: #888;">Email</label>
            <input type="email" name="email" required style="width: 100%; padding: 0.75rem; background: #ffffff; border: 1px solid #ff0000; color: rgb(0, 0, 0); border-radius: 4px;">
        </div>
        <div style="margin-bottom: 1rem;">
            <label style="display: block; margin-bottom: 0.5rem; color: #888;">Password</label>
            <input type="password" name="password" required style="width: 100%; padding: 0.75rem; background: #ffffff; border: 1px solid #ff0000; color: rgb(0, 0, 0); border-radius: 4px;">
        </div>
        <div style="margin-bottom: 1.5rem;">
            <label style="display: block; margin-bottom: 0.5rem; color: #888;">Confirm Password</label>
            <input type="password" name="password_confirm" required style="width: 100%; padding: 0.75rem; background: #ffffff; border: 1px solid #ff0000; color: rgb(0, 0, 0); border-radius: 4px;">
        </div>
        <button type="submit" style="width: 100%; padding: 0.75rem; background: #e50914; border: none; color: rgb(255, 255, 255); border-radius: 4px; cursor: pointer; font-weight: 600;">
            Register
        </button>
    </form>
    <p style="text-align: center; margin-top: 1rem; color: #666;">
        Already have an account? <a href="/login/" style="color: #e50914;">Login</a>
    </p>
</div>
{% endblock %}
